name: Daily Cron to Cold Start and Health Check Site

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  health-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Verify service availability after cold start
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ secrets.BASE_URL }}
          max-attempts: 20
          retry-delay: 20s
